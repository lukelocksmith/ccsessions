# Konfiguracja ccsessions (cs + cn)

# Uprawnienia
DANGEROUSLY_SKIP_PERMISSIONS=true

# Rozszerzenie przeglądarki (chrome / firefox / none)
BROWSER=chrome

# Model (sonnet / opus / haiku / lub pełna nazwa np. claude-sonnet-4-6)
MODEL=sonnet

# Poziom wysiłku (low / medium / high)
EFFORT=high

# Folder z projektami
PROJECTS_DIR=~/Projects
